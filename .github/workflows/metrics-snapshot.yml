name: metrics-snapshot
on:
  schedule:
    - cron: "30 21 * * 0" # 월 06:30 KST — weekly-sync(21:00 UTC) 직후
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: metrics-snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Collect metrics
        run: python -X utf8 scripts/collect_metrics.py
        env:
          # traffic(views/clones)은 관리자 권한 필요 — METRICS_TOKEN(PAT) 없으면
          # GITHUB_TOKEN 폴백으로 stars/forks만 기록된다 (스크립트가 403을 격리)
          METRICS_TOKEN: ${{ secrets.METRICS_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          # 배포용 FLY_API_TOKEN은 지표 읽기 권한이 없음(403) — readonly 조직
          # 토큰(FLY_METRICS_TOKEN) 사용, 없으면 fly 수집은 skip으로 기록
          FLY_API_TOKEN: ${{ secrets.FLY_METRICS_TOKEN }}
      - name: Commit snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/metrics/
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "chore: 주간 지표 스냅샷 [skip ci]"
          git push
